# golangci-lint v2 configuration
# https://golangci-lint.run/docs/configuration/

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Essential — catches real bugs
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Security
    - gosec

    # Recommended — widely adopted, low false-positive rate
    - bodyclose
    - errorlint
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam

    # Complexity
    - gocyclo

    # Best practices
    - gocritic
    - exhaustive
    - usetesting
    - usestdlibvars

  settings:
    gocyclo:
      min-complexity: 15

    errcheck:
      check-blank: false

    staticcheck:
      checks: ["all", "-SA4010"]

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - gocyclo
          - noctx
          - nilerr
          - revive
          - exhaustive
      - text: "Error return value.*is not checked"
        linters:
          - errcheck
      - text: "os/exec.Command must not be called"
        linters:
          - noctx
      - text: "G204|G301|G104"
        linters:
          - gosec
      - text: "if-return|exported.*stutters|package-comments"
        linters:
          - revive
      - text: "unnecessary conversion"
        linters:
          - unconvert

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
  sort-results: true
