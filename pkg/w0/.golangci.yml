# golangci-lint configuration for w0 package
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    # Essential
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Security
    - gosec

    # Quality
    - bodyclose
    - errorlint
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam

    # Complexity
    - gocyclo

  settings:
    gocyclo:
      min-complexity: 15

    errcheck:
      check-blank: true

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
