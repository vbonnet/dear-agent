# harness-effort-defaults.yaml
# Canonical effort-tier specification for all AI harnesses.
# Override at: ~/.config/company/engram/harness-effort.yaml
#              ~/.config/engram/harness-effort.yaml

model_aliases:
  latest-haiku:  "claude-haiku-4-5"
  latest-sonnet: "claude-sonnet-4"
  latest-opus:   "claude-opus-4"

subagent_preference: "in_harness"

task_types:
  research:
    harness_order: ["gemini", "claude", "codex", "opencode"]
  code_review:
    harness_order: ["claude", "codex", "gemini", "opencode"]
  architecture:
    harness_order: ["claude", "codex", "gemini", "opencode"]
  operational:
    harness_order: ["claude", "opencode", "codex", "gemini"]
  default:
    harness_order: ["claude", "codex", "gemini", "opencode"]

tiers:
  lookup:
    description: "Fast factual lookups, status checks, simple queries"
    providers:
      anthropic:
        model: "latest-haiku"
        effort: "low"
      openai:
        model: "o4-mini"
        reasoning_effort: "low"
      google:
        model: "gemini-2.5-flash"
  operational:
    description: "Workflow execution, file edits, standard dev tasks"
    providers:
      anthropic:
        model: "latest-sonnet"
        effort: "medium"
      openai:
        model: "o4-mini"
        reasoning_effort: "medium"
      google:
        model: "gemini-2.5-flash"
  analysis:
    description: "Code review, spec review, quality assessment"
    providers:
      anthropic:
        model: "latest-sonnet"
        effort: "high"
      openai:
        model: "o3"
        reasoning_effort: "medium"
      google:
        model: "gemini-2.5-pro"
  deep:
    description: "Architecture review, research synthesis, complex reasoning"
    providers:
      anthropic:
        model: "latest-opus"
        effort: "high"
      openai:
        model: "o3"
        reasoning_effort: "high"
      google:
        model: "gemini-2.5-pro"
