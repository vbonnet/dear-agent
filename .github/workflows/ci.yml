name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: "go.sum"

      - name: Install tmux (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install tmux

      - name: Download dependencies
        run: go mod download

      - name: Build
        # The first three binaries collide with same-named directories
        # under the repo root (./agm, ./agm-reaper exists as a dir, etc.),
        # so go build refuses to write the executable next to the source
        # tree. Force the output into a build/ directory keyed off the
        # binary name so each invocation has a unique destination.
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.Version=2.0.0-dev -X main.GitCommit=${GIT_COMMIT} -X main.BuildDate=${BUILD_DATE} -X main.BuiltBy=ci"
          mkdir -p build
          go build -ldflags="${LDFLAGS}" -o build/agm ./agm/cmd/agm
          go build -ldflags="${LDFLAGS}" -o build/agm-reaper ./agm/cmd/agm-reaper
          go build -ldflags="${LDFLAGS}" -o build/agm-mcp-server ./agm/cmd/agm-mcp-server
          go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
        env:
          # Skip tmux-dependent tests on macOS CI
          CI_SKIP_TMUX: ${{ matrix.os == 'macos-latest' && 'true' || 'false' }}

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
