name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # `-scan package` skips SSA construction. The default `-scan symbol`
      # mode panics on tailscale.com's transitive use of generic types in
      # github.com/go-json-experiment/json (golang.org/x/tools v0.44.0
      # subster bug). Package-level granularity is still enforced; we lose
      # only the per-symbol "called/not-called" filtering.
      - name: Run govulncheck
        run: govulncheck -scan package ./...
        env:
          GOWORK: "off"
