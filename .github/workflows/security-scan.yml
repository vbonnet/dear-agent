name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # Symbol-level scan: only fails when our code actually reaches a
      # vulnerable function. Package-level mode flags any vulnerable
      # package in the import graph, which trips on tailscale.com's
      # transitive github.com/gorilla/csrf (GO-2025-3884 has Fixed in:
      # N/A, but the vulnerable TrustedOrigins API is not on any path
      # we call).
      - name: Run govulncheck
        run: govulncheck -scan symbol ./...
        env:
          GOWORK: "off"
