name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # `-scan package` instead of default `-scan symbol`: the latter
      # builds SSA and panics inside golang.org/x/tools v0.44.0 lift on
      # tailscale.com's generic-heavy code paths. Package mode skips
      # SSA but flags any vulnerable package in the import graph,
      # including transitive ones we don't actually call. The jq pass
      # filters known-not-called false positives by GO ID.
      #
      # Allowlist (review on every dep bump):
      #   GO-2025-3884 — github.com/gorilla/csrf TrustedOrigins.
      #     Pulled in via tailscale.com/client/web. Fixed in: N/A.
      #     Our code never invokes csrf.Protect / TrustedOrigins;
      #     symbol-mode confirms (when run on Go ≥1.26 where the SSA
      #     panic is absent).
      - name: Run govulncheck
        run: |
          set -euo pipefail
          govulncheck -format json -scan package ./... > vulncheck.json
          unhandled=$(jq -c \
            --argjson allow '["GO-2025-3884"]' \
            'select(.finding != null)
             | select(.finding.osv as $id | $allow | index($id) | not)
             | .finding' \
            vulncheck.json)
          if [ -n "$unhandled" ]; then
            echo "Unallowed vulnerabilities found:"
            echo "$unhandled"
            exit 1
          fi
          echo "No unallowed vulnerabilities."
        env:
          GOWORK: "off"
