name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Tests
        run: go test -race ./...

      - name: Build Binaries
        run: |
          VERSION=${{ github.ref_name }}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.GitCommit=${GIT_COMMIT} -X main.BuildDate=${BUILD_DATE} -X main.BuiltBy=goreleaser"

          GOOS=linux  GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/agm-linux-amd64   ./cmd/agm
          GOOS=linux  GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/agm-linux-arm64   ./cmd/agm
          GOOS=darwin GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/agm-darwin-amd64  ./cmd/agm
          GOOS=darwin GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/agm-darwin-arm64  ./cmd/agm

      - name: Create Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
