name: SBOM and Security Scan

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]
  schedule:
    # Weekly scan on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy to generate SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'

      - name: Generate SPDX SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'spdx-json'
          output: 'sbom-spdx.json'

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 90

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy with exit code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  go-vulnerability-check:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      # `-scan package` instead of default `-scan symbol`: the latter
      # builds SSA and panics inside golang.org/x/tools v0.44.0 lift on
      # tailscale.com's generic-heavy code paths. Package mode skips
      # SSA but flags any vulnerable package in the import graph,
      # including transitive ones we don't actually call. The jq pass
      # filters known-not-called false positives by GO ID.
      #
      # Allowlist (review on every dep bump):
      #   GO-2025-3884 — github.com/gorilla/csrf TrustedOrigins.
      #     Pulled in via tailscale.com/client/web. Fixed in: N/A.
      #     Our code never invokes csrf.Protect / TrustedOrigins.
      - name: Run govulncheck
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -format json -scan package ./... > vulncheck.json
          unhandled=$(jq -c \
            --argjson allow '["GO-2025-3884"]' \
            'select(.finding != null)
             | select(.finding.osv as $id | $allow | index($id) | not)
             | .finding' \
            vulncheck.json)
          if [ -n "$unhandled" ]; then
            echo "Unallowed vulnerabilities found:"
            echo "$unhandled"
            exit 1
          fi
          echo "No unallowed vulnerabilities."
