# Monthly DEAR audit workflow. See configs/workflows/audit-daily.yaml
# for the design rationale.
name: audit-monthly
version: "1"
description: |
  Monthly-cadence DEAR audit. Expensive checks live here:
  test-quality, complexity hotspots, doc staleness, license, deep
  security scans.
inputs:
  - name: db
    default: ".dear-agent/audit.db"
  - name: repo
    default: "."

nodes:
  - id: run-monthly
    kind: bash
    name: workflow-audit run --cadence monthly
    bash:
      cmd: |
        set -euo pipefail
        cd "$INPUT_repo"
        workflow-audit run --cadence monthly --db "$INPUT_db"
