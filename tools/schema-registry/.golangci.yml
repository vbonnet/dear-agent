# golangci-lint v2 configuration
# See https://golangci-lint.run/docs/configuration/

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    # Essential — catches real bugs
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Security
    - gosec

    # Recommended — widely adopted, low false-positive rate
    - bodyclose
    - errorlint
    - misspell
    - nilerr
    - noctx
    - revive
    - unconvert
    - unparam

    # Complexity
    - gocyclo

  settings:
    gocyclo:
      min-complexity: 15

    errcheck:
      check-blank: true

    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - gocyclo
    paths:
      - .worktrees
      - third_party
      - vendor

output:
  formats:
    text:
      print-issued-lines: true
      print-linter-name: true
  sort-results: true

issues:
  max-same-issues: 0
