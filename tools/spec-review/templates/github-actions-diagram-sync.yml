# GitHub Actions workflow for diagram-code sync validation
# Place this file at .github/workflows/diagram-sync.yml in your repository

name: Diagram Sync Validation

on:
  pull_request:
    paths:
      - 'diagrams/**'
      - 'src/**'
      - '**.go'
      - '**.py'
      - '**.ts'
      - '**.tsx'

  push:
    branches:
      - main
      - master
    paths:
      - 'diagrams/**'
      - 'src/**'

jobs:
  sync-check:
    name: Check Diagram-Code Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install diagram-sync skill
        run: |
          # Install from spec-review-marketplace
          pip install pyyaml
          # Build Go binary
          cd skills/diagram-sync/cmd/diagram-sync
          go build -o diagram-sync

      - name: Run sync validation
        id: sync
        run: |
          # Check all diagrams in diagrams/ directory
          FAILED=0

          for diagram in diagrams/*.{d2,dsl,mmd}; do
            if [ -f "$diagram" ]; then
              echo "Checking $diagram..."

              # Run diagram-sync
              python skills/diagram-sync/diagram_sync.py "$diagram" . --json > sync-result.json

              # Extract sync score
              SCORE=$(jq -r '.sync_score' sync-result.json)
              RATING=$(jq -r '.rating' sync-result.json)

              echo "  Score: $SCORE/100 ($RATING)"

              # Fail if score < 80 (configurable threshold)
              if (( $(echo "$SCORE < 80" | bc -l) )); then
                echo "  ❌ FAILED: Sync score below threshold (80)"
                FAILED=1
              else
                echo "  ✅ PASSED"
              fi

              # Display recommendations
              jq -r '.recommendations[]' sync-result.json | sed 's/^/    - /'
            fi
          done

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi

      - name: Comment PR with sync results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('sync-result.json', 'utf8'));

            const comment = `## 📊 Diagram Sync Validation

            **Sync Score**: ${results.sync_score.toFixed(1)}/100 (${results.rating})
            **Matched Components**: ${results.matched_components}/${results.total_diagram_components}

            ${results.missing_in_code && results.missing_in_code.length > 0 ? `
            ### ⚠️ Missing in Code
            ${results.missing_in_code.map(c => `- \`${c}\``).join('\n')}
            ` : ''}

            ${results.extra_in_code && results.extra_in_code.length > 0 ? `
            ### ℹ️ Extra in Code (not in diagram)
            ${results.extra_in_code.map(c => `- \`${c}\``).join('\n')}
            ` : ''}

            ${results.recommendations && results.recommendations.length > 0 ? `
            ### 💡 Recommendations
            ${results.recommendations.map(r => `- ${r}`).join('\n')}
            ` : ''}
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Upload sync results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagram-sync-results
          path: sync-result.json

  block-on-critical-drift:
    name: Block PR on Critical Drift
    runs-on: ubuntu-latest
    needs: sync-check
    if: failure()

    steps:
      - name: Check sync score
        run: |
          echo "::error::Critical diagram-code drift detected. Sync score below 80%."
          echo "Review the diagram sync validation results and update diagrams before merging."
          exit 1
