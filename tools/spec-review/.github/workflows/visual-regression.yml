name: Visual Regression Testing

on:
  pull_request:
    paths:
      - 'examples/**/*.d2'
      - 'examples/**/*.dsl'
      - 'examples/**/*.mmd'
      - 'lib/diagram/**'
      - 'skills/render-diagrams/**'
      - 'scripts/visual-regression.sh'
      - 'test/visual-baselines/**'

  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for baseline comparison

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install D2
        run: |
          go install oss.terrastruct.com/d2@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick bc

      - name: Run visual regression tests
        id: visual_regression
        run: |
          bash scripts/visual-regression.sh
        continue-on-error: true

      - name: Upload diff images
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diffs
          path: |
            test/visual-diffs/
            test/visual-current/
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read visual regression output (if available)
            let comment = '## Visual Regression Test Results\n\n';

            // Check if there are diff images
            const diffDir = 'test/visual-diffs/';
            if (fs.existsSync(diffDir)) {
              const diffFiles = fs.readdirSync(diffDir);

              if (diffFiles.length > 0) {
                comment += '⚠️ Visual differences detected:\n\n';
                diffFiles.forEach(file => {
                  comment += `- \`${file}\`\n`;
                });
                comment += '\nReview diff images in the workflow artifacts.\n';
              } else {
                comment += '✅ No visual differences detected.\n';
              }
            } else {
              comment += '✅ No visual differences detected.\n';
            }

            comment += '\n---\n';
            comment += '_Generated by visual-regression.yml_\n';

            // Post comment
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      - name: Check test results
        run: |
          if [ -f test/visual-diffs/*.png ]; then
            echo "::warning::Visual differences detected - review artifacts"
          fi
